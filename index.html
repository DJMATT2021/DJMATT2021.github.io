<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>E‑Bike Demo Dashboard (Random Data)</title>

<!-- Chart.js for graphs -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- Canvas Gauges for the speedometer -->
<script src="https://cdn.jsdelivr.net/npm/canvas-gauges"></script>

<style>
body {
  background: #111;
  color: #fff;
  font-family: Arial, sans-serif;
  text-align: center;
  padding: 20px;
}
#container {
  max-width: 450px;
  margin: auto;
}
canvas {
  margin-top: 20px;
}
.gauge-row {
  display: flex;
  justify-content: space-around;
  flex-wrap: wrap;
}
.gauge-box {
  width: 150px;
  height: 150px;
}
</style>
</head>

<body>

<h2>E‑Bike Dashboard Demo</h2>

<div id="container">

  <!-- Three gauges -->
  <div class="gauge-row">
    <canvas id="speedGauge" class="gauge-box"></canvas>
    <canvas id="powerGauge" class="gauge-box"></canvas>
    <canvas id="rpmGauge" class="gauge-box"></canvas>
  </div>

  <!-- Two graphs -->
  <canvas id="graph1" width="350" height="200"></canvas>
  <canvas id="graph2" width="350" height="200"></canvas>

</div>

<script>
// ------------------ SPEED GAUGE ------------------
var speedGauge = new RadialGauge({
    renderTo: 'speedGauge',
    width: 150,
    height: 150,
    units: "km/h",
    minValue: 0,
    maxValue: 80,
    majorTicks: ["0","10","20","30","40","50","60","70","80"],
    colorPlate: "#222",
    colorNumbers: "#fff",
    needleType: "arrow",
    animationDuration: 150
}).draw();

// ------------------ POWER GAUGE ------------------
var powerGauge = new RadialGauge({
    renderTo: 'powerGauge',
    width: 150,
    height: 150,
    units: "Watts",
    minValue: 0,
    maxValue: 1500,
    majorTicks: ["0","250","500","750","1000","1250","1500"],
    colorPlate: "#222",
    colorNumbers: "#fff",
    needleType: "arrow",
    animationDuration: 150
}).draw();

// ------------------ PAS RPM GAUGE ------------------
var rpmGauge = new RadialGauge({
    renderTo: 'rpmGauge',
    width: 150,
    height: 150,
    units: "PAS RPM",
    minValue: 0,
    maxValue: 120,
    majorTicks: ["0","20","40","60","80","100","120"],
    colorPlate: "#222",
    colorNumbers: "#fff",
    needleType: "arrow",
    animationDuration: 150
}).draw();

// ------------------ GRAPH 1 ------------------
const g1 = document.getElementById('graph1');
const graph1 = new Chart(g1, {
    type: 'line',
    data: {
        labels: [],
        datasets: [{
            label: 'Random Value A',
            data: [],
            borderColor: 'lime',
            borderWidth: 2
        }]
    },
    options: { scales: { y: { min: 0, max: 100 } } }
});

// ------------------ GRAPH 2 ------------------
const g2 = document.getElementById('graph2');
const graph2 = new Chart(g2, {
    type: 'line',
    data: {
        labels: [],
        datasets: [{
            label: 'Random Value B',
            data: [],
            borderColor: 'cyan',
            borderWidth: 2
        }]
    },
    options: { scales: { y: { min: 0, max: 100 } } }
});

// ------------------ RANDOM DATA LOOP ------------------
setInterval(() => {
    // Random values
    let speed = Math.random() * 80;
    let power = Math.random() * 1500;
    let rpm = Math.random() * 120;
    let valA = Math.random() * 100;
    let valB = Math.random() * 100;

    // Update gauges
    speedGauge.value = speed;
    powerGauge.value = power;
    rpmGauge.value = rpm;

    // Update graph 1
    graph1.data.labels.push("");
    graph1.data.datasets[0].data.push(valA);
    if (graph1.data.labels.length > 40) {
        graph1.data.labels.shift();
        graph1.data.datasets[0].data.shift();
    }
    graph1.update();

    // Update graph 2
    graph2.data.labels.push("");
    graph2.data.datasets[0].data.push(valB);
    if (graph2.data.labels.length > 40) {
        graph2.data.labels.shift();
        graph2.data.datasets[0].data.shift();
    }
    graph2.update();

}, 10); // update every second

</script>

</body>
</html>
