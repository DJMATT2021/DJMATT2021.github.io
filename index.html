<!DOCTYPE html>
<html>
<head>
<link rel="apple-touch-icon" href="icons/icon-192.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ebike BLE Viewer</title>

<!-- Required for iOS PWA -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<link rel="manifest" href="manifest.json">

<style>
body {
  background: #111;
  color: #fff;
  font-family: Arial, sans-serif;
  text-align: center;
  padding: 20px;
}
button {
  padding: 15px 25px;
  font-size: 18px;
  border-radius: 10px;
  margin-bottom: 20px;
}
#output {
  white-space: pre-line;
  background: #222;
  padding: 15px;
  border-radius: 10px;
  text-align: left;
  max-width: 400px;
  margin: auto;
  font-size: 16px;
}
</style>
</head>

<body>

<h2>Ebike BLE Viewer</h2>

<button id="connectBtn">Connect to ESP32</button>

<div id="output">Waiting for data...</div>

<script>
// Register service worker for PWA
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js");
}

// BLE UUIDs
const SERVICE_UUID = "0000ffe0-0000-1000-8000-00805f9b34fb";
const CHAR_UUID    = "0000ffe1-0000-1000-8000-00805f9b34fb";

let bleDevice;
let bleCharacteristic;

async function connectBLE() {
    try {
        bleDevice = await navigator.bluetooth.requestDevice({
            filters: [{ services: [SERVICE_UUID] }]
        });

        const server = await bleDevice.gatt.connect();
        const service = await server.getPrimaryService(SERVICE_UUID);
        bleCharacteristic = await service.getCharacteristic(CHAR_UUID);

        await bleCharacteristic.startNotifications();
        bleCharacteristic.addEventListener("characteristicvaluechanged", handleData);

        document.getElementById("output").innerText = "Connected. Waiting for data...";
    } 
    catch (error) {
        document.getElementById("output").innerText = "BLE Error: " + error;
    }
}

function handleData(event) {
    let text = new TextDecoder().decode(event.target.value).trim();
    document.getElementById("output").innerText = text;
}

document.getElementById("connectBtn").onclick = connectBLE;
</script>

</body>
</html>
